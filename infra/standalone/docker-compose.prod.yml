# =============================================================================
# VOYANT - Docker Compose PRODUCTION Overrides
# =============================================================================
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# All secrets should come from .env.production (gitignored)
# =============================================================================

services:
  # ===========================================================================
  # CORE: Voyant API (Production Settings)
  # ===========================================================================
  voyant-api:
    environment:
      VOYANT_ENV: production
      DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: ${ALLOWED_HOSTS:-voyant.example.com}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://voyant.example.com}
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
          cpus: "1"
        reservations:
          memory: 512M
          cpus: "0.5"
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  voyant-mcp:
    environment:
      VOYANT_ENV: production
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
    restart: always

  voyant-worker:
    environment:
      VOYANT_ENV: production
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
    restart: always

  # ===========================================================================
  # DATA INFRASTRUCTURE (Persistent Volumes)
  # ===========================================================================
  postgres:
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1G
    restart: always

  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 256M
    restart: always

  kafka:
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_LOG_RETENTION_HOURS: 168  # 7 days
    deploy:
      resources:
        limits:
          memory: 2G
    restart: always

  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 1G
    restart: always

  # ===========================================================================
  # SECURITY (Keycloak)
  # ===========================================================================
  keycloak:
    command: start --optimized
    environment:
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-auth.voyant.example.com}
      KC_PROXY: edge
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 1G
    restart: always

  # ===========================================================================
  # ANALYTICS (Trino)
  # ===========================================================================
  trino:
    deploy:
      resources:
        limits:
          memory: 2G
    restart: always

  # ===========================================================================
  # TEMPORAL (Workflow Orchestration)
  # ===========================================================================
  temporal:
    deploy:
      resources:
        limits:
          memory: 1G
    restart: always

# =============================================================================
# PERSISTENT VOLUMES (Named Volumes for Production)
# =============================================================================
volumes:
  postgres_data:
    driver: local
    name: voyant-postgres-prod
  redis_data:
    driver: local
    name: voyant-redis-prod
  kafka_data:
    driver: local
    name: voyant-kafka-prod
  minio_data:
    driver: local
    name: voyant-minio-prod
  elasticsearch_data:
    driver: local
    name: voyant-elasticsearch-prod
