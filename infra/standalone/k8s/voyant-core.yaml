---
apiVersion: v1
kind: Service
metadata:
  name: voyant-api
  namespace: voyant
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: voyant-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voyant-api
  namespace: voyant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voyant-api
  template:
    metadata:
      labels:
        app: voyant-api
    spec:
      containers:
        - name: voyant-api
          image: voyant-app
          ports:
            - containerPort: 8000
          env:
            - name: VOYANT_ENV
              value: "${VOYANT_ENV}"
            - name: VOYANT_SECRETS_BACKEND
              value: "${VOYANT_SECRETS_BACKEND}"
            - name: DATABASE_URL
              value: "${DATABASE_URL}"
            - name: REDIS_URL
              value: "${REDIS_URL}"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "${KAFKA_BOOTSTRAP_SERVERS}"
            - name: MINIO_ENDPOINT
              value: "${MINIO_ENDPOINT}"
            - name: MINIO_ACCESS_KEY
              value: "${MINIO_ACCESS_KEY}"
            - name: MINIO_SECRET_KEY
              value: "${MINIO_SECRET_KEY}"
            - name: DATAHUB_GMS_URL
              value: "${DATAHUB_GMS_URL}"
            - name: TRINO_URL
              value: "${TRINO_URL}"
            - name: KEYCLOAK_URL
              value: "${KEYCLOAK_URL}"
            - name: KEYCLOAK_REALM
              value: "${KEYCLOAK_REALM}"
            - name: KEYCLOAK_CLIENT_ID
              value: "${KEYCLOAK_CLIENT_ID}"
            - name: KEYCLOAK_CLIENT_SECRET
              value: "${KEYCLOAK_CLIENT_SECRET}"
            - name: LAGO_API_URL
              value: "${LAGO_API_URL}"
            - name: LAGO_API_KEY
              value: "${LAGO_API_KEY}"
            - name: VOYANT_ENABLE_QUALITY
              value: "true"
            - name: VOYANT_ENABLE_BILLING
              value: "true"
            - name: VOYANT_ENABLE_DATAHUB
              value: "true"
            - name: TEMPORAL_HOST
              value: "${TEMPORAL_HOST}"
            - name: TEMPORAL_TASK_QUEUE
              value: "${TEMPORAL_TASK_QUEUE}"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "100m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voyant-worker
  namespace: voyant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voyant-worker
  template:
    metadata:
      labels:
        app: voyant-worker
    spec:
      containers:
        - name: voyant-worker
          image: voyant-app
          command: [ "python", "-m", "apps.worker.worker_main" ]
          env:
            - name: DATABASE_URL
              value: "${DATABASE_URL}"
            - name: REDIS_URL
              value: "${REDIS_URL}"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "${KAFKA_BOOTSTRAP_SERVERS}"
            - name: TEMPORAL_HOST
              value: "${TEMPORAL_HOST}"
            - name: TEMPORAL_TASK_QUEUE
              value: "${TEMPORAL_TASK_QUEUE}"
          ports:
            - containerPort: 9090
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: voyant-worker
  namespace: voyant
spec:
  ports:
    - port: 9090
      targetPort: 9090
  selector:
    app: voyant-worker
