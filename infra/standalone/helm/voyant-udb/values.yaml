image:
  repository: ghcr.io/yourorg/udb-api
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 80
  internalUrl: "${API_INTERNAL_URL}"

features:
  quality: true
  charts: true
  unstructured: false
  events: true
  tracing: false
  rbac: true
  narrative: true
  kestra: false

kestra:
  baseUrl: "${KESTRA_BASE_URL}"
  apiToken: "${KESTRA_API_TOKEN}"

resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 512Mi

affinity: {}
nodeSelector: {}
tolerations: []

persistence:
  duckdb:
    enabled: true
    size: 20Gi
    storageClass: ""
  artifacts:
    enabled: true
    size: 20Gi
    storageClass: ""

redis:
  enabled: true
  image: redis:7
  url: "${REDIS_URL}"

kafka:
  enabled: true
  image: bitnami/kafka:3.7
  kraft:
    enabled: true
    nodeId: 1
    controllerPort: 9093
    controllerHost: "${KAFKA_CONTROLLER_HOST}"

postgres:
  enabled: true
  image: postgres:15
  storage: 10Gi

airbyte:
  enabled: true
  version: 0.50.48
  externalUrl: "${AIRBYTE_URL}"
  internalUrl: "${AIRBYTE_INTERNAL_URL}"

ingress:
  enabled: false
  className: nginx
  host: "${INGRESS_HOST}"
  annotations: {}
  tls: []

metrics:
  serviceMonitor:
    enabled: false
    interval: 30s

prune:
  enabled: true
  schedule: "0 3 * * *"
  retentionDays: 7

extraEnv: []
