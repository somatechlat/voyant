apiVersion: v1
kind: Namespace
metadata:
  name: voyant
  labels:
    app.kubernetes.io/part-of: voyant
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: voyant-mem-quota
  namespace: voyant
spec:
  hard:
    limits.memory: "8Gi"
    requests.memory: "8Gi"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: voyant-defaults
  namespace: voyant
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "256Mi"
